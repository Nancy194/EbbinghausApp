services:
  - type: web
    name: ebbinghaus-api
    runtime: node
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromService:
          name: ebbinghaus-db
          type: pserv
          property: connectionString

  - type: pserv
    name: ebbinghaus-db
    plan: free
    runtime: image
    image:
      image: render/postgresql
