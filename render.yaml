services:
  - type: web
    name: ebbinghaus-api
    runtime: node
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ebbinghaus-db
          property: connectionString

  - type: web
    name: ebbinghaus-web
    runtime: static
    branch: main
    buildCommand: npx expo export --platform web
    staticPublishPath: dist

databases:
  - name: ebbinghaus-db
    plan: free
